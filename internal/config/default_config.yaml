server:
  host: "127.0.0.1"
  port: 7878

database:
  path: "./agent-eval.db"

session:
  idle_timeout_minutes: 30

tasks:
  randomize: false

replication:
  enabled: false
  count: 3

profiles:
  - match: { model: "claude-haiku-*", effort: "low" }
    difficulty: [1, 1]
  - match: { model: "claude-haiku-*", effort: "medium" }
    difficulty: [1, 2]
  - match: { model: "claude-haiku-*", effort: "high" }
    difficulty: [1, 2]
  - match: { model: "claude-sonnet-*", effort: "low" }
    difficulty: [1, 2]
  - match: { model: "claude-sonnet-*", effort: "medium" }
    difficulty: [1, 3]
  - match: { model: "claude-sonnet-*", effort: "high" }
    difficulty: [2, 3]
  - match: { model: "claude-opus-*", effort: "low" }
    difficulty: [1, 3]
  - match: { model: "claude-opus-*", effort: "medium" }
    difficulty: [2, 3]
  - match: { model: "claude-opus-*", effort: "high" }
    difficulty: [3, 3]
  - match: { model: "gpt-5-*", effort: "low" }
    difficulty: [1, 2]
  - match: { model: "gpt-5-*", effort: "medium" }
    difficulty: [1, 3]
  - match: { model: "gpt-5-*", effort: "high" }
    difficulty: [2, 3]
